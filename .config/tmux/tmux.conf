set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
#set -g @plugin 'catppuccin/tmux'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-restore the last saved session on tmux server start, autosave every
# 15 min - so pane/window layout survives reboots without a manual save.
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

### Allow for copying between panes
setw -g mode-keys vi
set -g set-clipboard off
bind-key -T copy-mode-vi v send-keys -X begin-selection

# bind y key in copy mode to select and copy to system clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Enable scrolling
set -g mouse on
set -ga terminal-overrides ',*256color*:smcup@:rmcup@'
set-option -g default-shell /bin/bash

# Set the control character to Ctrl+Spacebar (instead of Ctrl+B)
set -g prefix C-space
unbind-key C-b
bind-key C-space send-prefix

# Set new panes to open in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# vim-tmux-navigator: the nvim-side keymaps for Ctrl-hjkl live in
# .config/nvim/lua/plugins/vim_tmux_navigator.lua, but that only handles
# navigation *within* nvim's own splits. These bindings are the other half -
# they let Ctrl-hjkl also move between tmux panes when a plain shell (not
# nvim) has focus, so the same keys work everywhere.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

# Floating project switcher (fzf over ~/projects) and lazygit, both as
# popups so they don't disturb your pane layout.
bind-key f display-popup -w 90% -h 90% -E "~/dotfiles/bin/tmux-sessionizer"
bind-key g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E lazygit

# tmux only reads this file at server start, never automatically - reload
# it into an already-running server with prefix+r instead of restarting tmux.
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

run '~/.tmux/plugins/tpm/tpm'
